<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lemnisca — Access</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="./Assets/favicon.png" />
  <link rel="apple-touch-icon" href="./Assets/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; background: #000; color: #f4f5f6;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      -webkit-font-smoothing: antialiased;
    }
    body { display: flex; align-items: center; justify-content: center; }

    .gate {
      width: 100%; max-width: 360px; padding: 0 24px;
      display: flex; flex-direction: column; align-items: center; gap: 0;
    }

    .logo-mark {
      width: 48px; height: 48px; margin-bottom: 32px;
    }

    .label {
      font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
      color: #92989c; margin-bottom: 28px; text-align: center;
    }

    input[type="password"] {
      width: 100%; padding: 12px 16px;
      background: #111315; border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px; color: #f4f5f6;
      font-family: inherit; font-size: 14px;
      outline: none; transition: border-color .2s;
      margin-bottom: 10px;
    }
    input[type="password"]:focus { border-color: #38afd8; }
    input[type="password"]::placeholder { color: #62686c; }

    .err {
      font-size: 12px; color: #e05c5c; min-height: 18px;
      margin-bottom: 12px; text-align: center; width: 100%;
    }

    button {
      width: 100%; padding: 12px;
      background: #38afd8; border: none; border-radius: 8px;
      color: #04222c; font-family: inherit; font-size: 12px;
      letter-spacing: 0.12em; text-transform: uppercase;
      cursor: pointer; transition: background .2s;
    }
    button:hover { background: #5bc7ec; }
  </style>
</head>
<body>
  <div class="gate">
    <!-- Lemnisca lemniscate mark (inline SVG so no extra request) -->
    <svg class="logo-mark" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M24 24C24 24 14 10 8 10C2 10 2 38 8 38C14 38 24 24 24 24Z" stroke="#38afd8" stroke-width="2" fill="none"/>
      <path d="M24 24C24 24 34 10 40 10C46 10 46 38 40 38C34 38 24 24 24 24Z" stroke="#38afd8" stroke-width="2" fill="none"/>
    </svg>

    <p class="label">Lemnisca &mdash; Confidential</p>

    <form method="POST" action="/api/auth" id="loginForm">
      <input type="password" name="password" id="pwInput" placeholder="Enter password" autofocus autocomplete="current-password" />
      <div class="err" id="errMsg">
        <!-- show error from ?error=1 query param -->
      </div>
      <button type="submit">Enter</button>
    </form>
  </div>

  <script>
    if (new URLSearchParams(location.search).get('error') === '1') {
      document.getElementById('errMsg').textContent = 'Incorrect password.';
    }
  </script>
</body>
</html>
